<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diffusion — an interactive deep-dive</title>
  <link rel="stylesheet" href="vendor/katex.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/scene0.css">
  <link rel="stylesheet" href="css/scene1.css">
  <link rel="stylesheet" href="css/scene2.css">
  <link rel="stylesheet" href="css/scene3.css">
  <link rel="stylesheet" href="css/scene4.css">
  <link rel="stylesheet" href="css/scene5.css">
  <link rel="stylesheet" href="css/scene6.css">
  <link rel="stylesheet" href="css/scene7.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">D-MAVT</span>
      <span class="brand-sep">·</span>
      <span class="brand-title">Diffusion deep-dive</span>
    </div>
    <div class="topbar-center">
      <span id="scene-title" class="scene-title"></span>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="theme-label-light">Light</span><span class="theme-sep">/</span><span class="theme-label-dark">Dark</span>
      </button>
      <div id="dots" class="dots" aria-label="Scene pager"></div>
    </div>
  </header>

  <main class="stage" id="stage"></main>

  <footer class="controls">
    <button id="prev-btn" class="btn">← Prev</button>
    <span class="kbd-hint">Use <kbd>←</kbd> / <kbd>→</kbd> to step · <kbd>t</kbd> for theme</span>
    <button id="next-btn" class="btn primary">Next →</button>
  </footer>

  <!-- Vendored libs -->
  <script src="vendor/d3.v7.min.js"></script>
  <script src="vendor/katex.min.js"></script>

  <!-- Foundation -->
  <script src="js/theme.js"></script>
  <script src="js/diffusion-math.js"></script>
  <script src="js/diffusion-nn.js"></script>

  <!-- Pre-canned data (generated by precompute/) -->
  <script src="data/datasets.js"></script>

  <!-- Scene builders -->
  <script>window.scenes = {};</script>
  <script src="js/scenes/scene0.js"></script>
  <script src="js/scenes/scene1.js"></script>
  <script src="js/scenes/scene2.js"></script>
  <script src="js/scenes/scene3.js"></script>
  <script src="js/scenes/scene4.js"></script>
  <script src="js/scenes/scene5.js"></script>
  <script src="js/scenes/scene6.js"></script>
  <script src="js/scenes/scene7.js"></script>

  <!-- Driver -->
  <script src="js/main.js"></script>
</body>
</html>
